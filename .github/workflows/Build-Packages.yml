name: Build-Packages

on:
  workflow_dispatch:
    inputs:
      x86_sdk_url:
        description: 可选：x86/64 OpenWrt SDK 版本，需填写 openwrt-sdk-*.tar.* 完整下载链接，留空则自动使用 snapshots。
        required: false
        default: ''
        type: string
      aarch64_sdk_url:
        description: 可选：aarch64 OpenWrt SDK 版本，需填写 openwrt-sdk-*.tar.* 完整下载链接，留空则自动使用 snapshots。
        required: false
        default: ''
        type: string
      arch:
        description: 可选：要编译的架构，ALL 表示全部。
        required: false
        default: ALL
        type: choice
        options:
          - ALL
          - x86-64
          - aarch64
      package:
        description: 可选：要编译的软件包，ALL 表示全部。
        required: false
        default: ALL
        type: choice
        options:
          - ALL
          - aria2
          - ariang
          - frp
          - nginx
          - gecoosac
          - luci-app-aria2
          - luci-app-frpc
          - luci-app-frps
          - luci-app-gecoosac
  workflow_call:
    inputs:
      x86_sdk_url:
        required: false
        default: ''
        type: string
      aarch64_sdk_url:
        required: false
        default: ''
        type: string
      arch:
        required: false
        default: ALL
        type: string
      package:
        required: false
        default: ALL
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  TZ: Asia/Shanghai
  OUTPUT_DIR: ${{ github.workspace }}/artifacts/packages

jobs:
  Prepare:
    name: Prepare Matrix(准备编译矩阵)
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
    - name: Generate Build Matrix(生成编译矩阵)
      id: matrix
      env:
        SELECTED_ARCH: ${{ inputs.arch }}
        X86_SDK_URL: ${{ inputs.x86_sdk_url }}
        AARCH64_SDK_URL: ${{ inputs.aarch64_sdk_url }}
      run: |
        python3 - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        import os

        selected_arch = os.environ["SELECTED_ARCH"]
        builds = {
            "x86-64": {
                "name": "x86-64",
                "openwrt_target": "x86",
                "openwrt_subtarget": "64",
                "config_files": "configs/x86-64.config configs/Packages.config",
                "sdk_url": os.environ["X86_SDK_URL"],
            },
            "aarch64": {
                "name": "aarch64",
                "openwrt_target": "qualcommax",
                "openwrt_subtarget": "ipq60xx",
                "config_files": "configs/JDCloud.config configs/Packages.config",
                "sdk_url": os.environ["AARCH64_SDK_URL"],
            },
        }

        if selected_arch == "ALL":
            include = [builds["x86-64"], builds["aarch64"]]
        elif selected_arch in builds:
            include = [builds[selected_arch]]
        else:
            raise SystemExit(f"Unsupported arch: {selected_arch}")

        print(f"matrix={json.dumps({'include': include}, separators=(',', ':'))}")
        PY

  Build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-24.04
    needs: Prepare
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.Prepare.outputs.matrix) }}
    concurrency:
      group: packages-${{ matrix.name }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(grep "physical id" /proc/cpuinfo | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(grep name /proc/cpuinfo | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        free -h
        echo "--------------------------硬盘信息--------------------------"
        df -hT

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install \
          build-essential \
          clang \
          curl \
          file \
          flex \
          bison \
          g++ \
          gawk \
          gcc-multilib \
          gettext \
          git \
          libelf-dev \
          libncurses-dev \
          libssl-dev \
          python3 \
          python3-setuptools \
          rsync \
          tar \
          unzip \
          wget \
          xz-utils \
          zlib1g-dev \
          zstd
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout(检出代码)
      uses: actions/checkout@v4

    - name: Build Packages With OpenWrt SDK(使用OpenWrt SDK编译软件包)
      env:
        OPENWRT_TARGET: ${{ matrix.openwrt_target }}
        OPENWRT_SUBTARGET: ${{ matrix.openwrt_subtarget }}
        PACKAGE_CONFIG_FILES: ${{ matrix.config_files }}
        PACKAGE_ARCH_NAME: ${{ matrix.name }}
        PACKAGE_SELECTION: ${{ inputs.package }}
        SDK_URL: ${{ matrix.sdk_url }}
      run: |
        chmod +x scripts/SDK-script.sh
        scripts/SDK-script.sh

    - name: Upload Packages Artifact(上传软件包产物)
      uses: actions/upload-artifact@v4
      with:
        name: Packages-${{ matrix.name }}
        path: artifacts/packages/*
        if-no-files-found: error

  Release:
    runs-on: ubuntu-24.04
    needs: Build
    if: ${{ !cancelled() && needs.Build.result == 'success' }}

    steps:
    - name: Download Packages Artifacts(下载软件包产物)
      uses: actions/download-artifact@v4
      with:
        pattern: Packages-*
        path: artifacts/release
        merge-multiple: true

    - name: Upload Packages To Release(发布软件包)
      uses: ncipollo/release-action@v1
      with:
        name: Packages
        allowUpdates: true
        replacesArtifacts: true
        artifactErrorsFailBuild: true
        tag: Packages
        token: ${{ github.token }}
        artifacts: artifacts/release/*
        body: |
          **OpenWrt 软件包**
          - SDK 来源：默认自动使用 OpenWrt snapshots；如手动填写 SDK 地址，则以输入地址为准。
          - x86-64 配置文件：x86/64，configs/x86-64.config + configs/Packages.config
          - aarch64 配置文件：qualcommax/ipq60xx，configs/JDCloud.config + configs/Packages.config
          - 选择的架构：${{ inputs.arch }}
          - 选择的软件包：${{ inputs.package }}
          - 发布文件：带架构前缀的原始 .apk/.ipk 文件
          - 软件包源码：[laipeng668/packages](https://github.com/laipeng668/packages)（aria2、ariang、frp-binary-toml、nginx分支）
          - LuCI 源码：[laipeng668/luci](https://github.com/laipeng668/luci)（frp-toml分支）、[laipeng668/luci-app-gecoosac](https://github.com/laipeng668/luci-app-gecoosac)（main分支）
